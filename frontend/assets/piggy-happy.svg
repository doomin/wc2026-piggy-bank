<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" width="128" height="128">
  <!-- Body -->
  <rect x="16" y="28" width="32" height="24" fill="#F4A7B0"/>
  <rect x="12" y="32" width="4" height="16" fill="#F4A7B0"/>
  <rect x="48" y="32" width="4" height="16" fill="#F4A7B0"/>
  <!-- Head -->
  <rect x="20" y="12" width="24" height="20" fill="#F4A7B0"/>
  <rect x="16" y="16" width="4" height="12" fill="#F4A7B0"/>
  <rect x="44" y="16" width="4" height="12" fill="#F4A7B0"/>
  <!-- Snout -->
  <rect x="24" y="24" width="16" height="10" fill="#F08090"/>
  <rect x="26" y="26" width="4" height="4" fill="#C06070"/>
  <rect x="34" y="26" width="4" height="4" fill="#C06070"/>
  <!-- Happy eyes (closed arcs ^_^) -->
  <rect x="22" y="17" width="6" height="2" fill="#222222"/>
  <rect x="22" y="19" width="2" height="2" fill="#222222"/>
  <rect x="26" y="19" width="2" height="2" fill="#222222"/>
  <rect x="36" y="17" width="6" height="2" fill="#222222"/>
  <rect x="36" y="19" width="2" height="2" fill="#222222"/>
  <rect x="40" y="19" width="2" height="2" fill="#222222"/>
  <!-- Big smile -->
  <rect x="24" y="31" width="16" height="2" fill="#C06070"/>
  <rect x="22" y="29" width="4" height="2" fill="#C06070"/>
  <rect x="38" y="29" width="4" height="2" fill="#C06070"/>
  <!-- Ear -->
  <rect x="20" y="8" width="8" height="8" fill="#F08090"/>
  <rect x="36" y="8" width="8" height="8" fill="#F08090"/>
  <!-- Rosy cheeks -->
  <rect x="18" y="22" width="6" height="4" fill="#FF9090" opacity="0.6"/>
  <rect x="40" y="22" width="6" height="4" fill="#FF9090" opacity="0.6"/>
  <!-- Coin slot -->
  <rect x="26" y="28" width="12" height="3" fill="#C06070"/>
  <!-- Legs -->
  <rect x="18" y="50" width="8" height="8" fill="#F08090"/>
  <rect x="38" y="50" width="8" height="8" fill="#F08090"/>
  <!-- Tail -->
  <rect x="48" y="36" width="4" height="4" fill="#F08090"/>
  <rect x="52" y="32" width="4" height="4" fill="#F08090"/>
  <rect x="52" y="40" width="4" height="4" fill="#F08090"/>
  <!-- Stars sparkle -->
  <rect x="8" y="10" width="4" height="4" fill="#FFD700"/>
  <rect x="52" y="10" width="4" height="4" fill="#FFD700"/>
  <rect x="10" y="8" width="2" height="8" fill="#FFD700"/>
  <rect x="6" y="12" width="8" height="2" fill="#FFD700"/>
  <rect x="54" y="8" width="2" height="8" fill="#FFD700"/>
  <rect x="50" y="12" width="8" height="2" fill="#FFD700"/>
</svg>
