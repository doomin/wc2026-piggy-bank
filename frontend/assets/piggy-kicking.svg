<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" shape-rendering="crispEdges" width="160" height="128">
  <!-- Body -->
  <rect x="16" y="28" width="32" height="24" fill="#F4A7B0"/>
  <rect x="12" y="32" width="4"  height="16" fill="#F4A7B0"/>
  <rect x="48" y="32" width="4"  height="16" fill="#F4A7B0"/>
  <!-- Head -->
  <rect x="20" y="12" width="24" height="20" fill="#F4A7B0"/>
  <rect x="16" y="16" width="4"  height="12" fill="#F4A7B0"/>
  <rect x="44" y="16" width="4"  height="12" fill="#F4A7B0"/>
  <!-- Snout -->
  <rect x="24" y="24" width="16" height="10" fill="#F08090"/>
  <rect x="26" y="26" width="4"  height="4"  fill="#C06070"/>
  <rect x="34" y="26" width="4"  height="4"  fill="#C06070"/>
  <!-- Determined eyes (narrow) -->
  <rect x="22" y="16" width="4"  height="3"  fill="#222"/>
  <rect x="38" y="16" width="4"  height="3"  fill="#222"/>
  <rect x="22" y="19" width="6"  height="1"  fill="#222"/>
  <rect x="38" y="19" width="6"  height="1"  fill="#222"/>
  <!-- Firm mouth -->
  <rect x="26" y="30" width="12" height="2"  fill="#C06070"/>
  <!-- Ear -->
  <rect x="20" y="8"  width="8"  height="8"  fill="#F08090"/>
  <rect x="36" y="8"  width="8"  height="8"  fill="#F08090"/>
  <!-- Coin slot -->
  <rect x="26" y="28" width="12" height="3"  fill="#C06070"/>
  <!-- Left leg (planted) -->
  <rect x="18" y="50" width="8"  height="8"  fill="#F08090"/>
  <!-- Right leg KICKED FORWARD — extended to the right -->
  <rect x="40" y="46" width="8"  height="6"  fill="#F4A7B0"/>
  <rect x="48" y="48" width="8"  height="6"  fill="#F4A7B0"/>
  <rect x="56" y="50" width="8"  height="4"  fill="#F08090"/>
  <!-- Tail -->
  <rect x="48" y="36" width="4"  height="4"  fill="#F08090"/>
  <rect x="52" y="32" width="4"  height="4"  fill="#F08090"/>
  <rect x="52" y="40" width="4"  height="4"  fill="#F08090"/>
  <!-- motion lines -->
  <rect x="60" y="44" width="6"  height="2"  fill="#fff" opacity="0.5"/>
  <rect x="62" y="48" width="4"  height="2"  fill="#fff" opacity="0.4"/>
  <rect x="61" y="52" width="5"  height="2"  fill="#fff" opacity="0.3"/>
</svg>
