services:
  - type: web
    name: piggy-bank-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: piggy-bank-db
          property: connectionString

databases:
  - name: piggy-bank-db
    databaseName: piggy_bank
    user: piggy
